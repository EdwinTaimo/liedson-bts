<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liedson BTS — Ativação de Dados</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="apple-nav">
        <div class="nav-content">
            <span class="brand">Liedson BTS</span>
            <span class="status">Vodacom Online</span>
        </div>
    </nav>

    <header class="hero">
        <h1 class="gradient-text">Pacotes de Dados.</h1>
        <p class="subtitle">Escolha o seu plano e ative em segundos.</p>
    </header>

    <section class="container">
        <div class="category-header">
            <h2>Todos os Pacotes</h2>
        </div>
        <div class="grid-pacotes" id="pacotes-display">
            </div>
    </section>

    <section class="activation-section">
        <div class="activation-card">
            <h3>Ativar Agora</h3>
            <p>Cole abaixo a mensagem confirmando o seu M-Pesa para validar a transação no nosso grupo.</p>
            <textarea id="mpesa-msg" placeholder="Ex: ID da transação PP260331..."></textarea>
            <button onclick="enviarParaGrupo()" class="apple-btn-large">Validar e Enviar para Grupo</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
